<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" role="img" aria-label="fluid — anti-generic design skills for AI agents">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ad1c8"/>
      <stop offset="0.55" stop-color="#7fc4e8"/>
      <stop offset="1" stop-color="#7aa2ff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5ad1c8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5ad1c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7aa2ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7aa2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="420" fill="#0a0c12"/>
  <circle cx="1070" cy="30" r="470" fill="url(#glowA)"/>
  <circle cx="70" cy="430" r="430" fill="url(#glowB)"/>

  <!-- fluid ripple motif, off to the right -->
  <g fill="none" filter="url(#soft)" opacity="0.6">
    <circle cx="1410" cy="205" r="118" stroke="#5ad1c8" stroke-width="6"/>
    <circle cx="1410" cy="205" r="192" stroke="#7aa2ff" stroke-width="6"/>
    <circle cx="1410" cy="205" r="270" stroke="#5ad1c8" stroke-width="5"/>
    <circle cx="1410" cy="205" r="350" stroke="#7aa2ff" stroke-width="5"/>
  </g>
  <g fill="none">
    <circle cx="1410" cy="205" r="118" stroke="#5ad1c8" stroke-width="2.4" opacity="0.62"/>
    <circle cx="1410" cy="205" r="192" stroke="#7aa2ff" stroke-width="2.2" opacity="0.46"/>
    <circle cx="1410" cy="205" r="270" stroke="#5ad1c8" stroke-width="2" opacity="0.32"/>
    <circle cx="1410" cy="205" r="350" stroke="#7aa2ff" stroke-width="1.8" opacity="0.2"/>
    <circle cx="1410" cy="205" r="430" stroke="#5ad1c8" stroke-width="1.5" opacity="0.12"/>
  </g>
  <circle cx="1292" cy="205" r="5.5" fill="#5ad1c8"/>
  <circle cx="1228" cy="120" r="3.5" fill="#7aa2ff"/>
  <circle cx="1235" cy="296" r="3" fill="#5ad1c8" opacity="0.75"/>

  <!-- inset frame -->
  <rect x="1" y="1" width="1278" height="418" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- mark + eyebrow -->
  <g transform="translate(72,46)">
    <rect width="30" height="30" rx="9" fill="url(#wm)"/>
    <path d="M7 20 C 11 11, 19 11, 23 9" fill="none" stroke="#0a0c12" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M7 24 C 12 16, 20 16, 23 14" fill="none" stroke="#0a0c12" stroke-width="2.4" stroke-linecap="round" opacity="0.55"/>
  </g>
  <text x="116" y="67" font-size="13.5" letter-spacing="3.4" fill="#6b7486" font-weight="600">PLR STUDIO · DESIGN SYSTEM SKILLS</text>

  <!-- wordmark -->
  <text x="68" y="232" font-size="156" font-weight="800" letter-spacing="-5" fill="url(#wm)">fluid</text>

  <!-- tagline -->
  <text x="74" y="286" font-size="26" font-weight="500" fill="#b7c0cf">Production-grade UI for AI agents, minus the slop.</text>

  <!-- stat line -->
  <text x="74" y="344" font-size="16.5" letter-spacing="0.4" xml:space="preserve" font-family="'SF Mono', 'Consolas', 'Menlo', monospace">
    <tspan fill="#5ad1c8" font-weight="600">6</tspan><tspan fill="#8a93a6"> skills</tspan><tspan fill="#3a4150">   ·   </tspan><tspan fill="#5ad1c8" font-weight="600">108</tspan><tspan fill="#8a93a6"> palettes</tspan><tspan fill="#3a4150">   ·   </tspan><tspan fill="#5ad1c8" font-weight="600">57</tspan><tspan fill="#8a93a6"> type pairings</tspan><tspan fill="#3a4150">   ·   </tspan><tspan fill="#5ad1c8" font-weight="600">53</tspan><tspan fill="#8a93a6"> styles</tspan><tspan fill="#3a4150">   ·   </tspan><tspan fill="#5ad1c8" font-weight="600">22</tspan><tspan fill="#8a93a6">-rule detector</tspan>
  </text>

  <!-- works-with -->
  <text x="74" y="384" font-size="13" letter-spacing="2.2" fill="#5b6472" font-family="'SF Mono', 'Consolas', 'Menlo', monospace">WORKS WITH CLAUDE CODE · CURSOR · CODEX · COPILOT · GEMINI CLI · WINDSURF</text>
</svg>
